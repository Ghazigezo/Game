name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Unzip project
        run: unzip HunterGame.zip -d extracted

      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission
        run: chmod +x extracted/HunterGame/gradlew

      - name: Build APK
        working-directory: extracted/HunterGame
        run: ./gradlew assembleDebug

      - uses: actions/upload-artifact@v3
        with:
          name: HunterGame-APK
          path: extracted/HunterGame/app/build/outputs/apk/debug/*.apk
