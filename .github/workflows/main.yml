name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip project
        run: unzip HunterGame.zip -d extracted

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create launcher icons
        run: |
          python3 - <<'EOF'
          from PIL import Image, ImageDraw
          import os
          sizes = {
            'mipmap-mdpi': 48, 'mipmap-hdpi': 72,
            'mipmap-xhdpi': 96, 'mipmap-xxhdpi': 144, 'mipmap-xxxhdpi': 192
          }
          base = 'extracted/HunterGame/app/src/main/res'
          for folder, size in sizes.items():
            os.makedirs(f'{base}/{folder}', exist_ok=True)
            img = Image.new('RGB', (size, size), color=(26, 58, 26))
            d = ImageDraw.Draw(img)
            d.ellipse([size//4, size//4, 3*size//4, 3*size//4], fill=(255, 215, 0))
            img.save(f'{base}/{folder}/ic_launcher.png')
            img.save(f'{base}/{folder}/ic_launcher_round.png')
          print('Icons created!')
          EOF

      - name: Download Gradle wrapper
        working-directory: extracted/HunterGame
        run: |
          mkdir -p gradle/wrapper
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip" > gradle/wrapper/gradle-wrapper.properties
          curl -L https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          curl -L https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradlew -o gradlew
          chmod +x gradlew

      - name: Build APK
        working-directory: extracted/HunterGame
        run: ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: HunterGame-APK
          path: extracted/HunterGame/app/build/outputs/apk/debug/*.apk
